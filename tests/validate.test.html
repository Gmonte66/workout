<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Validate tests</title>
  <style>
    body { font-family: ui-monospace, monospace; background: #111; color: #ddd; padding: 20px; }
    .pass { color: #10b981; }
    .fail { color: #ef4444; }
    pre { background: #1a1a1a; padding: 8px 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    h2 { color: #fff; margin-top: 24px; }
    summary { cursor: pointer; }
  </style>
</head>
<body>
  <h1>Workout JSON Validator — Tests</h1>
  <div id="summary"></div>
  <div id="results"></div>

  <script>document.write('<script src="../app.js?t=' + Date.now() + '"><\/script>');</script>
  <script>
    const v = window.__workout.validateWorkout;
    const e = window.__workout.validateExportBlob;

    const cases = [
      // ───── workout: valid ─────
      ['valid minimal workout', () => v({
        version: 1, id: 'a', name: 'A',
        exercises: [{ id: 'x', name: 'X', sets: 3, reps: 10 }],
      }).length === 0],
      ['valid full workout', () => v({
        version: 1, id: 'a', name: 'A', unit: 'kg',
        exercises: [
          { id: 'x', name: 'X', sets: 3, reps: 10, weight: 100, rest: 60, notes: 'foo' },
          { id: 'y', name: 'Y', sets: 2, reps: 8 },
        ],
      }).length === 0],

      // ───── workout: invalid top-level ─────
      ['rejects non-object', () => v(null).length > 0],
      ['rejects array top-level', () => v([]).length > 0],
      ['rejects wrong version', () => v({ version: 2, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1 }] }).length > 0],
      ['rejects empty id', () => v({ version: 1, id: '', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1 }] }).length > 0],
      ['rejects empty name', () => v({ version: 1, id: 'a', name: '', exercises: [{ id:'x', name:'X', sets:1, reps:1 }] }).length > 0],
      ['rejects bad unit', () => v({ version: 1, id: 'a', name: 'A', unit: 'oz', exercises: [{ id:'x', name:'X', sets:1, reps:1 }] }).length > 0],
      ['rejects empty exercises', () => v({ version: 1, id: 'a', name: 'A', exercises: [] }).length > 0],

      // ───── workout: invalid exercise ─────
      ['rejects exercise missing id', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ name:'X', sets:1, reps:1 }] }).length > 0],
      ['rejects exercise missing name', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', sets:1, reps:1 }] }).length > 0],
      ['rejects zero sets', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:0, reps:1 }] }).length > 0],
      ['rejects negative reps', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:-1 }] }).length > 0],
      ['rejects float sets', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1.5, reps:1 }] }).length > 0],
      ['rejects negative weight', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, weight:-1 }] }).length > 0],
      ['rejects non-string notes', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, notes: 123 }] }).length > 0],
      ['rejects duplicate exercise ids', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:1, reps:1 },
        { id:'x', name:'Y', sets:1, reps:1 },
      ] }).length > 0],

      // ───── workout: bounds ─────
      ['rejects too many sets', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:51, reps:1 }] }).length > 0],
      ['accepts exactly max sets', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:50, reps:1 }] }).length === 0],
      ['rejects too many reps', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1001 }] }).length > 0],
      ['rejects insane weight', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, weight: 100000 }] }).length > 0],
      ['rejects rest > 1 hour', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, rest: 3601 }] }).length > 0],
      ['rejects NaN weight', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, weight: NaN }] }).length > 0],
      ['rejects Infinity weight', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, weight: Infinity }] }).length > 0],

      // ───── repsMin (rep ranges) ─────
      ['accepts repsMin within range', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:8, repsMin:6 }] }).length === 0],
      ['rejects repsMin > reps', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:6, repsMin:8 }] }).length > 0],
      ['rejects negative repsMin', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:8, repsMin:-1 }] }).length > 0],
      ['rejects non-integer repsMin', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:8, repsMin:6.5 }] }).length > 0],
      ['accepts repsMin === reps', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:8, repsMin:8 }] }).length === 0],

      // ───── restActivity (prehab during rest) ─────
      ['accepts valid restActivity', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { name: 'Toe yoga', prescription: '30s each foot' } }] }).length === 0],
      ['accepts omitted restActivity', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1 }] }).length === 0],
      ['accepts null restActivity (treated as omitted)', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: null }] }).length === 0],
      ['rejects restActivity missing name', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { prescription: 'x' } }] }).length > 0],
      ['rejects restActivity missing prescription', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { name: 'x' } }] }).length > 0],
      ['rejects restActivity name empty string', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { name: '', prescription: 'x' } }] }).length > 0],
      ['rejects restActivity name too long (>40)', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { name: 'a'.repeat(41), prescription: 'x' } }] }).length > 0],
      ['accepts restActivity name exactly 40', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { name: 'a'.repeat(40), prescription: 'x' } }] }).length === 0],
      ['rejects restActivity prescription too long (>200)', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { name: 'x', prescription: 'a'.repeat(201) } }] }).length > 0],
      ['accepts restActivity prescription exactly 200', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { name: 'x', prescription: 'a'.repeat(200) } }] }).length === 0],
      ['rejects restActivity as array', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: [] }] }).length > 0],
      ['rejects restActivity name as non-string', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1, restActivity: { name: 123, prescription: 'x' } }] }).length > 0],

      // ───── supersetId (group two or more exercises) ─────
      ['accepts valid superset pair', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:4, reps:10, supersetId:'ss1' },
        { id:'y', name:'Y', sets:4, reps:15, supersetId:'ss1' },
      ] }).length === 0],
      ['accepts valid superset triset', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:3, reps:10, supersetId:'tri' },
        { id:'y', name:'Y', sets:3, reps:10, supersetId:'tri' },
        { id:'z', name:'Z', sets:3, reps:10, supersetId:'tri' },
      ] }).length === 0],
      ['accepts two distinct supersets in one workout', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:3, reps:5, supersetId:'ss1' },
        { id:'y', name:'Y', sets:3, reps:5, supersetId:'ss1' },
        { id:'z', name:'Z', sets:3, reps:8 },
        { id:'p', name:'P', sets:2, reps:12, supersetId:'ss2' },
        { id:'q', name:'Q', sets:2, reps:12, supersetId:'ss2' },
      ] }).length === 0],
      ['rejects superset group of 1', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:1, reps:1, supersetId:'ss1' },
        { id:'y', name:'Y', sets:1, reps:1 },
      ] }).length > 0],
      ['rejects superset members with different set counts', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:4, reps:10, supersetId:'ss1' },
        { id:'y', name:'Y', sets:3, reps:15, supersetId:'ss1' },
      ] }).length > 0],
      ['rejects non-contiguous superset members', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:3, reps:10, supersetId:'ss1' },
        { id:'z', name:'Z', sets:3, reps:5 },
        { id:'y', name:'Y', sets:3, reps:10, supersetId:'ss1' },
      ] }).length > 0],
      ['rejects empty supersetId string', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:1, reps:1, supersetId:'' },
        { id:'y', name:'Y', sets:1, reps:1, supersetId:'' },
      ] }).length > 0],
      ['rejects non-string supersetId', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:1, reps:1, supersetId:1 },
        { id:'y', name:'Y', sets:1, reps:1, supersetId:1 },
      ] }).length > 0],
      ['accepts omitted supersetId', () => v({ version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1 }] }).length === 0],
      ['rejects supersetId longer than 40 chars', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:1, reps:1, supersetId:'g'.repeat(41) },
        { id:'y', name:'Y', sets:1, reps:1, supersetId:'g'.repeat(41) },
      ] }).length > 0],
      ['accepts supersetId exactly 40 chars', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:1, reps:1, supersetId:'g'.repeat(40) },
        { id:'y', name:'Y', sets:1, reps:1, supersetId:'g'.repeat(40) },
      ] }).length === 0],
      ['rejects supersetId as boolean', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:1, reps:1, supersetId:true },
        { id:'y', name:'Y', sets:1, reps:1, supersetId:true },
      ] }).length > 0],
      ['accepts large superset (quad-set)', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'a1', name:'A1', sets:3, reps:10, supersetId:'quad' },
        { id:'a2', name:'A2', sets:3, reps:10, supersetId:'quad' },
        { id:'a3', name:'A3', sets:3, reps:10, supersetId:'quad' },
        { id:'a4', name:'A4', sets:3, reps:10, supersetId:'quad' },
      ] }).length === 0],
      ['rejects same supersetId separated by a non-superset exercise', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:2, reps:10, supersetId:'ss1' },
        { id:'y', name:'Y', sets:2, reps:10, supersetId:'ss1' },
        { id:'gap', name:'GAP', sets:2, reps:10 },
        { id:'z', name:'Z', sets:2, reps:10, supersetId:'ss1' },
        { id:'w', name:'W', sets:2, reps:10, supersetId:'ss1' },
      ] }).length > 0],
      ['accepts two distinct supersets back-to-back with no gap', () => v({ version: 1, id: 'a', name: 'A', exercises: [
        { id:'x', name:'X', sets:3, reps:10, supersetId:'ssA' },
        { id:'y', name:'Y', sets:3, reps:10, supersetId:'ssA' },
        { id:'p', name:'P', sets:2, reps:12, supersetId:'ssB' },
        { id:'q', name:'Q', sets:2, reps:12, supersetId:'ssB' },
      ] }).length === 0],

      // ───── export blob ─────
      ['valid empty export blob', () => e({ schema: 1, exportedAt: 0, library: {}, history: [] }).length === 0],
      ['valid populated export blob', () => e({
        schema: 1, exportedAt: 0,
        library: { 'a': { version: 1, id: 'a', name: 'A', exercises: [{ id:'x', name:'X', sets:1, reps:1 }] } },
        history: [{ workoutId: 'a', workoutName: 'A', startedAt: 1, finishedAt: 2, setsLog: [] }],
      }).length === 0],
      ['rejects export with wrong schema', () => e({ schema: 2, exportedAt: 0, library: {}, history: [] }).length > 0],
      ['rejects export with array library', () => e({ schema: 1, library: [], history: [] }).length > 0],
      ['rejects export with bad nested workout', () => e({
        schema: 1, library: { 'a': { version: 1, id: 'a', name: 'A', exercises: [] } }, history: [],
      }).length > 0],
    ];

    let pass = 0, fail = 0;
    const results = document.getElementById('results');
    cases.forEach(([label, fn]) => {
      let ok = false; let err = null;
      try { ok = !!fn(); } catch (e) { err = e; }
      if (ok) { pass++; results.insertAdjacentHTML('beforeend', `<div class="pass">PASS · ${label}</div>`); }
      else {
        fail++;
        results.insertAdjacentHTML('beforeend', `<div class="fail">FAIL · ${label}${err ? ' · ' + err.message : ''}</div>`);
      }
    });
    document.getElementById('summary').innerHTML =
      `<h2><span class="pass">${pass} pass</span> · <span class="${fail ? 'fail' : 'pass'}">${fail} fail</span> · ${cases.length} total</h2>`;
  </script>
</body>
</html>
